name: CI

permissions:
  contents: read

on:
  push:
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'docs/examples/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'docs/examples/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      # Audit is non-blocking: the only current high/critical advisories are in
      # dev-only tooling (vitest / @vitest/coverage-v8, GHSA-5xrq-8626-4rwp).
      # That advisory only triggers when the Vitest UI server is listening; CI
      # runs `vitest run` (no UI), so it is not exploitable here. The fix is a
      # breaking vitest 3->4 major bump, deferred to a dedicated upgrade. Keep
      # `|| true` until that lands, then make audit gate again.
      - run: npm audit --audit-level=high || true
      - run: npm run lint
      - run: npm run build
      # Doc examples (docs/examples/*.ts) are compiled against the just-built
      # packages so README/handbook "runnable" snippets cannot drift from the API.
      - name: Typecheck doc examples
        run: npx tsc -p docs/examples/tsconfig.json --noEmit
      - if: matrix.node-version != 22
        run: npm run test

      - name: Coverage
        if: matrix.node-version == 22
        run: npx vitest run --coverage

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
