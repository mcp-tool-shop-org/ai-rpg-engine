name: CI

permissions:
  contents: read

on:
  push:
    paths:
      - 'packages/**'
      - 'templates/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'docs/examples/**'
      - 'docs/check-docs-integrity.mjs'
      - 'docs/mixed-game-viability-proof.ts'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'templates/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'docs/examples/**'
      - 'docs/check-docs-integrity.mjs'
      - 'docs/mixed-game-viability-proof.ts'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      # Audit GATES on high/critical advisories in production deps (--omit=dev):
      # a real advisory in a shipped dependency now fails CI. Dev-only tooling is
      # excluded because the sole current high advisory (vitest /
      # @vitest/coverage-v8, GHSA-5xrq-8626-4rwp) only triggers when the Vitest
      # UI server is listening — CI runs `vitest run` (no UI), so it is not
      # exploitable here, and gating it would force a breaking vitest 3->4 major
      # bump for zero consumer risk. Drop `--omit=dev` (audit the full tree)
      # when that bump lands.
      - run: npm audit --audit-level=high --omit=dev
      - run: npm run lint
      - run: npm run build
      # Doc examples (docs/examples/*.ts) are compiled against the just-built
      # packages so README/handbook "runnable" snippets cannot drift from the API.
      - name: Typecheck doc examples
        run: npx tsc -p docs/examples/tsconfig.json --noEmit
      # Test-file typecheck gate (PROD-008): every package tsconfig excludes
      # src/**/*.test.ts (tests must not ship in dist), so `npm run build`
      # never sees test files and type errors in them accumulated silently —
      # 203 had piled up when this gate landed. tsconfig.tests.json is a flat
      # noEmit config over packages/*/src INCLUDING tests; cross-package
      # imports resolve against the dist/*.d.ts the build step just produced,
      # which is why this runs after build. One leg only — the check is
      # node-version independent, same as the packaging gate below.
      - name: Typecheck test files
        if: matrix.node-version == 22
        run: npm run typecheck:tests
      # Doc examples are also BEHAVIOR-tested (examples.test.ts), but the root
      # vitest config only includes packages/*, templates/*, and scripts/* — the
      # examples' tests run solely via their dedicated config. Executing them
      # here (after the build, so they resolve the just-built packages) makes the
      # README's "type-checked + behavior-tested" claim enforced in CI rather
      # than local-only. One leg only — the tests are node-version independent.
      - name: Behavior-test doc examples
        if: matrix.node-version == 22
        run: npx vitest run --config docs/examples/vitest.config.ts
      # docs/mixed-game-viability-proof.ts headlines itself as a "Release
      # Gate" architecture test (4 archetypes / 6 encounter modes coexisting
      # on one stat model, one combat stack, one world), but nothing invoked
      # it — the label was aspirational, not enforced. This step makes it
      # true. See scripts/verify-mixed-game-viability.mjs for why "compiles
      # + runs without throwing" is the proof's actual pass condition. One
      # leg only — node-version independent, same as the packaging gate below.
      - name: Release gate — mixed-game viability proof
        if: matrix.node-version == 22
        run: node scripts/verify-mixed-game-viability.mjs
      # Packaging gate (PG-5): every publishable workspace's `npm pack` tarball
      # must contain LICENSE + README.md. npm silently drops `files` entries
      # that don't exist on disk, so only inspecting the dry-run file list
      # catches a missing file (this is how the G3 LICENSE gap shipped).
      # One leg only — the check is node-version independent.
      - name: Packaging gate (LICENSE/README in every publishable tarball)
        if: matrix.node-version == 22
        run: node scripts/check-packaging.mjs

      - if: matrix.node-version != 22
        run: npm run test

      # Coverage thresholds in vitest.config.ts act as a ratchet: this step
      # goes red if coverage regresses below the floors recorded there.
      - name: Coverage
        if: matrix.node-version == 22
        run: npx vitest run --coverage

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
