name: Docs Integrity

# PG-2: runs the honesty-surface guard (docs/check-docs-integrity.mjs) on every
# push/PR that touches docs, markdown, the site, or package.json. Before this
# workflow existed the guard was manual-only — doc drift (stale test counts,
# chapter counts, version mismatches) shipped silently because doc edits never
# triggered any CI at all.
#
# Deliberately its own workflow (not a step in ci.yml): wiring these paths into
# ci.yml would run the full 2-node build/test matrix on every README edit. This
# job is checkout + node + one stdlib-only script — no npm ci — so a doc-only
# push costs seconds of Linux runner time.
#
# Workflow-file-count note (dogfood-swarm F-a160dfa6, assessed 2026-07-18):
# the org rule caps repos at 2 workflow files; this repo carries 4
# (ci.yml, docs-integrity.yml, release.yml, pages.yml). Folding this job into
# ci.yml was evaluated and rejected: GitHub Actions has no native per-job path
# filter, so a "clean" fold means either (a) union ci.yml's trigger paths with
# this file's — which puts the full 2-node matrix back on every doc-only push,
# the exact regression this file exists to avoid, or (b) add a third-party
# paths-filter action (e.g. dorny/paths-filter) to gate the build-and-test job
# — new supply-chain surface on trigger-critical CI logic that could not be
# runtime-verified in the session that made this call. Both cost more than the
# one extra file. Kept separate on purpose; revisit if a native per-job path
# filter ships, or if someone verifies a pinned paths-filter action end to end.

permissions:
  contents: read

on:
  push:
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'site/**'
      - 'package.json'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'site/**'
      - 'package.json'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # DOCS-05 compares package.json's version to the newest v* release
          # tag. Without tags the check self-skips (clearly logged) instead of
          # failing, so a shallow checkout degrades gracefully.
          fetch-tags: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # Stdlib-only script — no npm ci needed.
      - run: node docs/check-docs-integrity.mjs
