name: Release

# Publishes every @ai-rpg-engine/* package to npm via OIDC Trusted Publishing
# (no long-lived token) and the CLI image to GHCR. Fires on a published GitHub
# Release. workflow_dispatch offers a dry-run to validate the pipeline first.
#
# Kept separate from ci.yml/pages.yml (dogfood-swarm F-a160dfa6, one of 4
# workflow files vs the org's 2-file guideline): this is the only workflow
# triggered by `release: published`, and it's the only one holding
# `id-token: write` (npm OIDC) + `packages: write` (GHCR push) together —
# irreversible, credentialed publish actions that should not share a trigger
# surface with ci.yml's push/PR-on-any-branch test runs.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate only (npm publish --dry-run, docker build without push)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # npm Trusted Publishing (OIDC)
  packages: write # GHCR docker push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Force the docker/* JS actions (login/metadata/build-push) onto Node 24 — they
# still ship Node 20 entrypoints, which GitHub removes from runners on 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  npm:
    name: Publish npm packages (OIDC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Pinned to a CI-tested version (ci.yml matrix is [20, 22]); the
          # publish job must run on a runtime the test suite actually exercises.
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted Publishing requires a recent npm (OIDC support).
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test

      # Packaging gate (PG-5): refuse to publish any package whose tarball
      # lacks LICENSE or README.md. npm silently drops `files` entries that
      # don't exist on disk — this dry-run inspection is the only reliable
      # check, and it is the gate that would have caught the G3 LICENSE gap
      # before it reached npm.
      - name: Packaging gate (LICENSE/README in every publishable tarball)
        run: node scripts/check-packaging.mjs

      # Idempotent per-package publish: skip private packages and any version
      # already on npm, so a re-run after a partial failure completes the release
      # without erroring on already-published packages. Real publish errors still
      # halt the job (bash -e).
      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          for dir in packages/* templates/*; do
            [ -f "$dir/package.json" ] || continue
            priv=$(node -p "require('./$dir/package.json').private === true")
            [ "$priv" = "true" ] && { echo "skip private $dir"; continue; }
            name=$(node -p "require('./$dir/package.json').name")
            echo "::group::dry-run $name"
            npm publish -w "$name" --access public --provenance --dry-run
            echo "::endgroup::"
          done

      - name: Publish (live, idempotent)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          for dir in packages/* templates/*; do
            [ -f "$dir/package.json" ] || continue
            priv=$(node -p "require('./$dir/package.json').private === true")
            [ "$priv" = "true" ] && { echo "skip private $dir"; continue; }
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "skip $name@$ver (already published)"
            else
              echo "::group::publish $name@$ver"
              npm publish -w "$name" --access public --provenance
              echo "::endgroup::"
            fi
          done

  docker:
    name: Build & push CLI image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
